<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo Leveling - 3D RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }
    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loadingScreen h1 {
      font-size: 3rem;
      letter-spacing: 0.3em;
      color: #7b5ea7;
      text-shadow: 0 0 20px rgba(123, 94, 167, 0.5);
      margin-bottom: 2rem;
    }
    #loadingBar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #loadingBarFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #7b5ea7, #a855f7);
      transition: width 0.3s;
    }
    #loadingText {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
  <div id="loadingScreen">
    <h1>SOLO LEVELING</h1>
    <div id="loadingBar">
      <div id="loadingBarFill"></div>
    </div>
    <p id="loadingText">Yukleniyor...</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
